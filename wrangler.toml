# Cloudflare Workers — static dashboard + optional asset headers worker
# Deploy: cd web && npm run deploy
# Docs: https://developers.cloudflare.com/workers/static-assets/

name = "dompeng-dashboard"
main = "src/worker.js"
compatibility_date = "2025-05-23"

[assets]
directory = "."
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"

[observability]
enabled = true
